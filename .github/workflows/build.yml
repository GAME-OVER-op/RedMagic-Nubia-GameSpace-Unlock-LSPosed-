name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.7

      - name: Build Feature stub dex
        run: |
          mkdir -p /tmp/stubcls /tmp/stubout app/src/main/assets
          javac -d /tmp/stubcls app/src/main/java/com/zte/feature/Feature.java
          "$ANDROID_HOME/build-tools/34.0.0/d8" --min-api 28 --output /tmp/stubout /tmp/stubcls/com/zte/feature/Feature.class
          cp /tmp/stubout/classes.dex app/src/main/assets/feature_stub.dex
          ls -l app/src/main/assets/

      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: gsunlock-debug-apk
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
