plugins {
    id 'com.android.application'
}

android {
    namespace 'com.redmagic.gsunlock'
    compileSdk 34

    defaultConfig {
        applicationId 'com.redmagic.gsunlock'
        minSdk 28
        targetSdk 34
        versionCode 1
        versionName '1.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    buildTypes {
        release {
            minifyEnabled false
        }
    }
}

dependencies {
    // Xposed API — compileOnly: не попадает в APK, предоставляется LSPosed в runtime
    compileOnly 'de.robv.android.xposed:api:82'
}
